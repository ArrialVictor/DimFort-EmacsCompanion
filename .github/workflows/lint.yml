name: lint

# Runs on every push/PR to main (guarding the default branch) and on
# release tags.
#
# A thin LSP client has very little runtime behaviour to test — so
# this is byte-compile + package-lint only. Catches:
#   - Syntax errors and macro misuse (byte-compile)
#   - Convention violations that block MELPA acceptance
#     (package-lint). dimfort.el already has a MELPA-compatible
#     header; this guards against regression.

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    # No ``strategy.matrix`` — the apt install path below picks up
    # whatever Emacs ships with ``ubuntu-latest``. The original
    # single-value matrix (``emacs_version: ["29.1"]``) was a stale
    # pin from the Nix-based setup; with apt, there's nothing to
    # parameterise. Dropping the matrix also keeps the GitHub check
    # name as the plain ``lint`` (not ``lint (29.1)``) so the
    # required-status-checks rule in branch protection can name it
    # exactly — GitHub's ``(any source)`` notation is a source-
    # wildcard, not a matrix-name pattern.
    steps:
      - uses: actions/checkout@v4

      # Install Emacs from the runner's Ubuntu apt repository
      # (currently emacs-nox 29.x on ubuntu-latest). Replaces the
      # Nix-based ``purcell/setup-emacs`` / ``jcs090218/setup-emacs``
      # actions, both of which share an underlying mechanism that
      # polls ``api.github.com/repos/purcell/nix-emacs-ci/commits/HEAD``
      # on every run. When the GitHub API rate-limits unauthenticated
      # requests (HTTP 429), the Nix tooling chokes on the throttle
      # response ("parse error at line 1, column 1: ... invalid
      # literal '<U+001F>'") and the setup step fails before Emacs is
      # ever installed. This blocked PR #32 twice and PR #33 once on
      # 2026-06-28 — purely intermittent infrastructure flake, but
      # one that blocks branch-protected merges.
      #
      # ``apt-get install emacs-nox`` has no external API
      # dependencies on the hot path — packages are mirrored to the
      # runner's apt cache. The runner installs whatever Emacs ships
      # with its Ubuntu image (29.x on ubuntu-latest at time of
      # writing). For DimFort's lint job — byte-compile + package-
      # lint — any reasonably current Emacs satisfies; we lost
      # precise version pinning but gained reliability.
      - name: Set up Emacs (from runner system package)
        run: |
          sudo apt-get update
          sudo apt-get install -y emacs-nox
          emacs --version

      - name: Install package-lint
        run: |
          emacs --batch --eval "(progn \
            (require 'package) \
            (add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\") t) \
            (package-initialize) \
            (package-refresh-contents) \
            (package-install 'package-lint))"

      - name: Byte-compile
        run: |
          emacs --batch \
            --eval "(setq byte-compile-error-on-warn t)" \
            --funcall batch-byte-compile dimfort.el

      - name: package-lint
        run: |
          emacs --batch \
            --eval "(progn \
              (require 'package) \
              (add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\") t) \
              (package-initialize))" \
            -l package-lint \
            --funcall package-lint-batch-and-exit dimfort.el
