name: lint

# Runs on every push/PR to main (guarding the default branch) and on
# release tags.
#
# A thin LSP client has very little runtime behaviour to test — so
# this is byte-compile + package-lint only. Catches:
#   - Syntax errors and macro misuse (byte-compile)
#   - Convention violations that block MELPA acceptance
#     (package-lint). dimfort.el already has a MELPA-compatible
#     header; this guards against regression.

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Stay close to the floor declared by Package-Requires.
        # Adding a newer version is cheap if regressions surface.
        emacs_version: ["29.1"]
    steps:
      - uses: actions/checkout@v4

      # ``purcell/setup-emacs@master`` uses a Nix-based install path
      # that polls ``api.github.com`` on every run to resolve the
      # latest commit on ``nix-emacs-ci``. When the GitHub API is
      # under load and unauthenticated requests hit the rate limit
      # (HTTP 429), the Nix tooling chokes on the throttle response
      # ("parse error at line 1, column 1: ... invalid literal
      # '<U+001F>'") and the setup step fails before Emacs is ever
      # installed. This blocked PR #32 twice in a row on 2026-06-28.
      #
      # ``jcs090218/setup-emacs@master`` pulls prebuilt Emacs
      # binaries from a GitHub Release rather than evaluating a Nix
      # expression — no per-run API resolution, no rate-limit
      # exposure on the hot path. Same ``with: version:`` arg.
      - name: Set up Emacs
        uses: jcs090218/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Install package-lint
        run: |
          emacs --batch --eval "(progn \
            (require 'package) \
            (add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\") t) \
            (package-initialize) \
            (package-refresh-contents) \
            (package-install 'package-lint))"

      - name: Byte-compile
        run: |
          emacs --batch \
            --eval "(setq byte-compile-error-on-warn t)" \
            --funcall batch-byte-compile dimfort.el

      - name: package-lint
        run: |
          emacs --batch \
            --eval "(progn \
              (require 'package) \
              (add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\") t) \
              (package-initialize))" \
            -l package-lint \
            --funcall package-lint-batch-and-exit dimfort.el
